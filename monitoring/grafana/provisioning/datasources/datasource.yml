apiVersion: 1

datasources:
  - name: PostgreSQL Pricing
    uid: pricing_postgres
    type: postgres
    access: proxy
    url: db:5432
    database: pricing_db
    user: grafana_reader
    isDefault: true
    editable: false
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      timescaledb: false
    secureJsonData:
      password: $__env{GRAFANA_DB_PASSWORD}
