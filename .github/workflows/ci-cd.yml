name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "./ml[dev]"
      - run: pytest ml/tests -v

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pricing_user
          POSTGRES_PASSWORD: pricing_pw
          POSTGRES_DB: pricing_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pricing_user -d pricing_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # conftest.py derives its own disposable "<db>_test" database from
      # this URL and applies db/sql/001_init_schema.sql itself -- no
      # separate schema-loading step needed here.
      DATABASE_URL: postgresql://pricing_user:pricing_pw@localhost:5432/pricing_ci
      API_KEY: ci-test-api-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ./ml
      - run: pip install -e "./api[dev]"
      - run: pytest api/tests -v

  test-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "./app[dev]"
      - run: pytest app/tests -v

  package:
    runs-on: ubuntu-latest
    needs: [test-ml, test-api, test-app]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python wheels (ml, api)
        run: |
          pip install build
          python -m build ml -o dist
          python -m build api -o dist
      - uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: dist/*

      - name: Compute lowercase image name
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/pricing-api:latest
            ghcr.io/${{ steps.image.outputs.owner }}/pricing-api:${{ github.sha }}
